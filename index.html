<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Irish Economic Dashboard</title>

  <!-- Vega & Vega-Lite -->
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    /* Example slider styling */
    input[type="range"] {
      width: 300px;
      accent-color: #0077cc;
    }

    /* Example radio styling */
    input[type="radio"] {
      accent-color: #0077cc;
    }
  </style>
</head>

<body>
  <h1>Irish Economic Dashboard</h1>

  <div id="vis"></div>

  <script>
    vegaEmbed('#vis', 'dashboard.json');
  </script>
</body>
</html>
