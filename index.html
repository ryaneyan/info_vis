<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Irish Economic Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px auto;
      max-width: 1200px;
    }

    #vis {
      margin-top: 20px;
    }

    /* Ensure Vega-Lite injected controls are visible */
    .vega-bindings {
      margin-bottom: 20px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    input[type="range"] {
      width: 300px;
      accent-color: #0066cc;
    }

    input[type="radio"] {
      accent-color: #0066cc;
      margin-right: 5px;
    }
  </style>
</head>

<body>

  <h1>Irish Economic Dashboard</h1>

  <div id="vis"></div>

  <script>
    vegaEmbed("#vis", "dashboard.json", { actions: false })
      .catch(console.error);
  </script>

</body>
</html>
