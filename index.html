<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Irish Economic Dashboard 2</title>

  <!-- Vega libraries -->
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px auto;
      max-width: 1200px;
      line-height: 1.5;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    /* Control styling */
    .controls {
      margin-bottom: 25px;
      padding: 15px;
      border-radius: 8px;
      background: #f5f5f5;
      border: 1px solid #ddd;
    }

    .controls label {
      font-weight: bold;
      margin-right: 10px;
    }

    input[type="range"] {
      width: 300px;
      accent-color: #0066cc;
      vertical-align: middle;
    }

    input[type="radio"] {
      accent-color: #0066cc;
      margin-right: 5px;
    }

    .radio-group {
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>Irish Economic Dashboard</h1>

  <!-- Vega-Lite container -->
  <div id="vis"></div>

  <script>
    vegaEmbed("#vis", "dashboard.json", {
      actions: false
    }).catch(console.error);
  </script>

</body>
</html>
